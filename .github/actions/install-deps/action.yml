name: Install build dependencies
description: Install cmake, gmp, and openssl for the current platform

runs:
  using: composite
  steps:
    - name: Install Linux deps
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libssl-dev libgmp-dev libgmpxx4ldbl

    - name: Install macOS deps
      if: runner.os == 'macOS'
      shell: bash
      run: brew install cmake gmp openssl@3

    - name: Set macOS library paths
      if: runner.os == 'macOS'
      shell: bash
      run: |
        echo "LIBRARY_PATH=$(brew --prefix gmp)/lib:$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
        echo "BICYCL_DEP_LIB_DIR=$(brew --prefix gmp)/lib:$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"

    - name: Install Windows deps (MSYS2)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make
          mingw-w64-x86_64-gmp
          mingw-w64-x86_64-openssl
