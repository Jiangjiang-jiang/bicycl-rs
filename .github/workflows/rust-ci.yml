name: rust-ci

on:
  push:
    paths:
      - 'Cargo.toml'
      - 'bicycl-rs/**'
      - 'bicycl-rs-sys/**'
      - 'scripts/**'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'bicycl-rs/**'
      - 'bicycl-rs-sys/**'
      - 'scripts/**'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/rust-ci.yml'

jobs:
  vendored:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            run_capi_smoke: true
            run_doc_check: true
          - os: macos-latest
            run_capi_smoke: true
            run_doc_check: false
          - os: windows-latest
            run_capi_smoke: false
            run_doc_check: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libgmp-dev libgmpxx4ldbl
      - name: Install macOS deps
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake gmp openssl@3
      - name: Install Windows deps
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-openssl
      - name: Add Windows GNU target
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: rustup target add x86_64-pc-windows-gnu
      - name: C API smoke
        if: matrix.run_capi_smoke
        run: |
          cmake -S bicycl-rs-sys/capi -B build/capi -DBUILD_TESTING=ON
          cmake --build build/capi
          ctest --test-dir build/capi --output-on-failure
      - name: Rust fmt
        if: matrix.os != 'windows-latest'
        run: cargo fmt --check
      - name: Rust fmt (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: cargo fmt --check
      - name: Rust clippy
        if: matrix.os != 'windows-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust clippy (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust test
        if: matrix.os != 'windows-latest'
        run: cargo test --workspace
      - name: Rust test (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: cargo test --workspace --target x86_64-pc-windows-gnu
      - name: Rust doc
        if: matrix.run_doc_check
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --workspace

  system-mode:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libgmp-dev libgmpxx4ldbl
      - name: Install macOS deps
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake gmp openssl@3
      - name: Set macOS linker search paths
        if: matrix.os == 'macos-latest'
        run: |
          echo "BICYCL_DEP_LIB_DIR=$(brew --prefix gmp)/lib:$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
      - name: Rust test (system mode from local libs)
        run: bash scripts/test-system-mode.sh

  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libgmp-dev libgmpxx4ldbl
      - name: C API smoke with ASan/UBSan
        env:
          # detect_leaks=0: known leak in upstream BICYCL (TwoPartyECDSA::Player1 EC_POINT)
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cmake -S bicycl-rs-sys/capi -B build/capi-sanitize -DBUILD_TESTING=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build/capi-sanitize
          ctest --test-dir build/capi-sanitize --output-on-failure

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.82
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libgmp-dev libgmpxx4ldbl
      - name: Check MSRV
        run: cargo check --workspace

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libgmp-dev libgmpxx4ldbl
      - name: cargo package (sys)
        run: cargo package -p bicycl-rs-sys --list && cargo package -p bicycl-rs-sys
      - name: cargo package (safe)
        run: cargo package -p bicycl-rs --list && cargo package -p bicycl-rs --no-verify
