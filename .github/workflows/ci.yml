name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vendored:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            run_capi_smoke: true
            run_doc_check: true
          - os: macos-latest
            run_capi_smoke: true
            run_doc_check: false
          - os: windows-latest
            run_capi_smoke: false
            run_doc_check: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'windows-latest' && 'x86_64-pc-windows-gnu' || '' }}
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libgmp-dev libgmpxx4ldbl
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake gmp openssl@3
      - name: Set macOS library paths
        if: runner.os == 'macOS'
        run: |
          echo "LIBRARY_PATH=$(brew --prefix gmp)/lib:$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
          echo "BICYCL_DEP_LIB_DIR=$(brew --prefix gmp)/lib:$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-openssl
      - name: C API smoke
        if: matrix.run_capi_smoke
        run: |
          cmake -S bicycl-rs-sys/capi -B build/capi -DBUILD_TESTING=ON
          cmake --build build/capi
          ctest --test-dir build/capi --output-on-failure
      - name: Rust fmt
        if: matrix.os != 'windows-latest'
        run: cargo fmt --check
      - name: Rust clippy
        if: matrix.os != 'windows-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust test (Unix)
        if: matrix.os != 'windows-latest'
        run: cargo test --workspace
      - name: Rust check (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cargo check --workspace --target x86_64-pc-windows-gnu
      - name: Rust doc
        if: matrix.run_doc_check
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --workspace

  system-mode:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libgmp-dev libgmpxx4ldbl
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake gmp openssl@3
      - name: Set macOS library paths
        if: runner.os == 'macOS'
        run: |
          echo "LIBRARY_PATH=$(brew --prefix gmp)/lib:$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
          echo "BICYCL_DEP_LIB_DIR=$(brew --prefix gmp)/lib:$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
      - name: Rust test (system mode from local libs)
        run: bash scripts/test-system-from-vendored.sh

  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libgmp-dev libgmpxx4ldbl
      - name: C API smoke with ASan/UBSan
        env:
          # detect_leaks=0: known leak in upstream BICYCL (TwoPartyECDSA::Player1 EC_POINT)
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cmake -S bicycl-rs-sys/capi -B build/capi-sanitize -DBUILD_TESTING=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build/capi-sanitize
          ctest --test-dir build/capi-sanitize --output-on-failure

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libgmp-dev libgmpxx4ldbl
      - name: cargo package (sys)
        run: cargo package -p bicycl-rs-sys --list && cargo package -p bicycl-rs-sys
      - name: cargo package (safe)
        # full package impossible until bicycl-rs-sys is on crates.io; list-only verifies included files
        run: cargo package -p bicycl-rs --list
