name: sync-upstream

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-deps

      - name: Read current upstream ref
        id: current
        run: |
          ref=$(sed -n 's/^ref = "\(.*\)"/\1/p' bicycl-rs-sys/vendor/bicycl-upstream.toml)
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Check latest upstream ref
        id: latest
        run: |
          repo=$(sed -n 's/^repo = "\(.*\)"/\1/p' bicycl-rs-sys/vendor/bicycl-upstream.toml)
          latest=$(git ls-remote "$repo" HEAD | cut -f1)
          echo "ref=$latest" >> "$GITHUB_OUTPUT"

      - name: Sync vendor
        if: steps.current.outputs.ref != steps.latest.outputs.ref
        run: bash scripts/sync-vendor.sh

      - name: Verify build
        if: steps.current.outputs.ref != steps.latest.outputs.ref
        run: cargo check --workspace

      - name: Create pull request
        if: steps.current.outputs.ref != steps.latest.outputs.ref
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/sync-upstream
          title: 'chore: sync vendored BICYCL to ${{ steps.latest.outputs.ref }}'
          body: |
            Automated daily sync from upstream BICYCL.

            Previous ref: `${{ steps.current.outputs.ref }}`
            New ref: `${{ steps.latest.outputs.ref }}`
          commit-message: 'chore: sync vendored BICYCL sources'
